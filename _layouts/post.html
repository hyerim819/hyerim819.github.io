---
layout: default
---

<div class="post-hero-wrap">
  <div class="container">
    <div class="row">
      <div class="col-lg-11 col-md-12 mx-auto">
       <div class="post-hero-card
          {% if page.categories contains 'development' %}mint
          {% elsif page.categories contains 'ctf-wargame' %}lavender
          {% elsif page.categories contains 'bugbounty' %}sky
          {% elsif page.categories contains 'blog-docs' %}peach
          {% elsif page.categories contains 'papers-conferences' %}pink
          {% elsif page.categories contains 'contests-certifications' %}butter
          {% endif %}">
          <h1>{{ page.title }}</h1>

          {% if page.subtitle %}
            <h2 class="post-hero-subtitle">{{ page.subtitle }}</h2>
          {% endif %}

          <p class="post-hero-meta">{{ page.date | date: "%Y-%m-%d" }}</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="row">
    <div class="col-lg-8 col-md-10 mx-auto">

      {{ content }}

      <hr>

      <div class="clearfix">
        {% if page.previous.url %}
        <a class="btn btn-primary float-left" href="{{ page.previous.url | prepend: site.baseurl | replace: '//', '/' }}">&larr; Previous<span class="d-none d-md-inline"> Post</span></a>
        {% endif %}
        {% if page.next.url %}
        <a class="btn btn-primary float-right" href="{{ page.next.url | prepend: site.baseurl | replace: '//', '/' }}">Next<span class="d-none d-md-inline"> Post</span> &rarr;</a>
        {% endif %}
      </div>

    </div>
  </div>
</div>
